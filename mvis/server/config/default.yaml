mysql:
  host: localhost
  user: mvis
  password: mvis
  database: mvis

cliknews:
  url: http://localhost:3000/
  namespace: 1
  userRole: cliknewsUser

www:
  # HTTP interface to listen on
  host: 127.0.0.1
  # HTTP(S) port to listen on
  trustedPort: 3010
  trustedPortIsHttps: false
  sandboxPort: 3011
  sandboxPortIsHttps: false
  apiPort: 3012
  apiPortIsHttps: false

  trustedUrlBase: http://localhost:3010
  sandboxUrlBase: http://localhost:3011


roles:
  global:
    cliknewsUser:
      name: "ClikNews User"
      admin: true
      description: "Limited permissions that allow only read-only access"
      permissions:

  namespace:
    cliknewsUser:
      name: "ClikNews User"
      description: "Limited permissions that allow only read-only access"
      permissions: ["view"]
      children:
        namespace: ["view"]
        template: ["view", "viewFiles", "execute"]
        workspace: ["view"]
        panel: ["view"]
        signal: ["view", "query"]
        signalSet: ["view", "query"]

